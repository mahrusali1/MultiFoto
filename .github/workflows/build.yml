name: Build MultiFoto AIX

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # PENTING: Untuk menarik isi folder lib/appinventor

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build Extension with Ant
      run: ant extensions

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: MultiFoto-Extension
        path: out/*.aix
