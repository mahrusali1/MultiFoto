name: Build MultiFoto AIX

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Supaya bisa dijalankan manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build Extension with Ant
      run: ant extensions

    - name: Upload AIX Result
      uses: actions/upload-artifact@v3
      with:
        name: MultiFoto-Extension
        path: out/*.aix
